# ============================================
# 视频规格要求 - Video Specifications
# ============================================
specifications:
  format: mp4
  codec: H.264 or H.265
  resolution: 3840x2160 (4K)
  frame_rate: 30fps
  bit_rate: 25-50 Mbps
  color_space: sRGB
  
  requirements:
    - 所有视频必须无版权问题或已获得授权
    - 视频应有平滑的循环点，无明显跳跃
    - 避免快速闪烁或刺眼的画面
    - 色调应柔和，适合长时间观看
    - 建议包含多种色调版本（暖色/冷色）

