<style>
  .mic-options {

  }

  .mic-stage {
    min-height: 240px;
    border-radius: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    background:
      radial-gradient(circle at center, rgba(78,205,196,0.10) 0%, rgba(78,205,196,0.04) 30%, rgba(15,52,96,0.55) 60%, rgba(12,24,44,0.85) 100%),

    overflow: hidden;
  }

    width: 210px;
    height: 210px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .mic-ring,
  .mic-glow,

    position: absolute;
    border-radius: 999px;
  }

  .mic-btn {

  .mic-shell--a .mic-ring {

  }

  .mic-shell--b .mic-ring {
    width: 188px;
    height: 188px;
    border: 3px solid rgba(78,205,196,0.58);
    animation: haloBreatheStrong 2.8s ease-in-out infinite;
  }

  .mic-shell--b .mic-glow {
    width: 152px;
    height: 152px;
    border: 10px solid rgba(78,205,196,0.10);
    animation: haloBreatheStrong 2.8s ease-in-out infinite;
  }

  .mic-shell--b .mic-glow-outer {
    width: 206px;
    height: 206px;
    background: radial-gradient(circle, rgba(78,205,196,0.16) 0%, rgba(78,205,196,0.05) 52%, rgba(78,205,196,0.00) 74%);
    animation: glowBreathe 2.8s ease-in-out infinite;
  }

  .mic-shell--b .mic-btn {
    animation: buttonBreatheStrong 2.8s ease-in-out infinite;
  }

  .mic-shell--c .mic-ring {
    width: 164px;
    height: 164px;
    border: 3px solid rgba(78,205,196,0.56);
  }

  .mic-shell--c .mic-glow {
    width: 198px;
    height: 198px;
    background: radial-gradient(circle, rgba(78,205,196,0.18) 0%, rgba(78,205,196,0.10) 36%, rgba(78,205,196,0.02) 58%, rgba(78,205,196,0.00) 76%);
    animation: softHaloBreathe 3.8s ease-in-out infinite;
  }

  .mic-shell--c .mic-btn {
    animation: buttonBreathe 3.8s ease-in-out infinite;
  }

  .tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 999px;
    margin-bottom: 10px;
    font-size: 12px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: #99f6e4;
    background: rgba(78,205,196,0.12);
    border: 1px solid rgba(78,205,196,0.16);
  }

  .card-body p {
    margin-bottom: 10px;
  }

  .mini-notes {
    color: rgba(226,232,240,0.80);
    font-size: 13px;
    line-height: 1.55;
  }

  @keyframes haloBreathe {
    0%, 100% { transform: scale(1); opacity: 0.84; }
    50% { transform: scale(1.10); opacity: 1; }
  }

  @keyframes haloBreatheStrong {
    0%, 100% { transform: scale(0.98); opacity: 0.66; }
    50% { transform: scale(1.16); opacity: 1; }
  }

  @keyframes glowBreathe {
    0%, 100% { transform: scale(0.96); opacity: 0.70; }

  }

  @keyframes softHaloBreathe {
    0%, 100% { transform: scale(0.94); opacity: 0.60; }

  }

    50% { transform: scale(1.06); box-shadow: inset 0 1px 0 rgba(255,255,255,0.14), 0 18px 44px rgba(5, 10, 24, 0.42); }
  }

  }
</style>
