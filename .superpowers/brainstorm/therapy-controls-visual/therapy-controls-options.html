<h2>疗愈页四个控制按钮改成哪种更合适？</h2>

    <div class="card-body">
      <h3>A - 文字操作条（推荐）</h3>

    </div>
  </div>

  <div class="card" data-choice="b" onclick="toggleSelect(this)">
