# 情绪平衡方案 - 中式风格
id: emotional_balance_chinese
name: 调和阴阳 - 情绪平衡
description: 采用中式阴阳调和理念，帮助恢复情绪平衡和内心和谐
target_emotions:
  - neutral
  - sad
  - anxious
intensity: medium
style: chinese
duration: 1200 # 20分钟

phases:
  - name: 静心入定
    duration: 300 # 5分钟
    light:
      color: "#8FBC8F" # 暗海绿
      brightness: 45
      transition: 5000
      pattern: static
    audio:
      file: content/audio/chinese_guzheng.mp3
      volume: 50
      loop: true
      fade_in: 4000
      fade_out: 2000
    visual:
      file: content/visual/yin_yang_flow.mp4
      loop: true
      brightness: 70
    voice_guide:
      text: 让我们回归内心的平衡。在中国传统智慧中，阴阳调和是健康的根本。现在，让我们一起找回这份和谐...
      voice: 中文女
      emotion: calm
      speed: 0.9
    chair:
      mode: gentle
      intensity: 3
    scent:
      scent_type: tea_tree
      intensity: 4

  - name: 阴阳调和
    duration: 540 # 9分钟
    light:
      color: "#9ACD32" # 黄绿色
      brightness: 55
      transition: 4000
      pattern: breath
    audio:
      file: content/audio/five_elements.mp3
      volume: 50
      loop: true
      fade_in: 2000
      fade_out: 2000
    visual:
      file: content/visual/tai_chi_flow.mp4
      loop: true
      brightness: 75
    voice_guide:
      text: 想象体内有两股能量，一阴一阳，如太极图般流转。吸气时，阳气上升；呼气时，阴气下沉。两者相互交融，达到完美的平衡...
      voice: 中文女
      emotion: gentle
      speed: 0.85
    chair:
      mode: wave
      intensity: 4

  - name: 和谐圆满
    duration: 360 # 6分钟
    light:
      color: "#98FB98" # 淡绿色
      brightness: 60
      transition: 3000
      pattern: static
    audio:
      file: content/audio/harmony_bells.mp3
      volume: 50
      loop: true
      fade_in: 2000
      fade_out: 3000
    visual:
      file: content/visual/zen_garden.mp4
      loop: true
      brightness: 80
    voice_guide:
      text: 感受内心的和谐与平衡。你的身心现在处于最佳状态。带着这份平和，你可以从容面对生活中的一切...
      voice: 中文女
      emotion: warm
      speed: 0.9
    chair:
      mode: relax
      intensity: 3

screen_prompts:
  - start_second: 0
    end_second: 60
    title: 安静落定
    lines:
      - 现在开始，让自己先安静下来。
      - 不需要追赶任何念头。
      - 先把身体放回一个稳定的位置。
  - start_second: 60
    end_second: 180
    title: 调匀呼吸
    lines:
      - 注意呼吸进出身体的节奏。
      - 吸气时放松，呼气时沉下来。
      - 让呼吸一点点变得均匀。
  - start_second: 180
    end_second: 360
    title: 感受身体平衡
    lines:
      - 观察头部、肩颈和后背的状态。
      - 哪里偏紧，就让那里慢慢放开。
      - 身体正在重新找回平衡。
  - start_second: 360
    end_second: 600
    title: 阴阳流转
    lines:
      - 想象身体里的气息在上下流动。
      - 紧和松、动和静，正在重新协调。
      - 你不需要控制，只要感受这份流动。
  - start_second: 600
    end_second: 900
    title: 稳住中心
    lines:
      - 现在，把注意力放回身体中心。
      - 情绪正在变得更平稳、更整齐。
      - 让这份稳定继续扩散开来。
  - start_second: 900
    end_second: 1080
    title: 收拢注意力
    lines:
      - 开始慢慢把意识带回这里。
      - 呼吸依旧平稳，身体依旧放松。
      - 你正在从深度安静里回来。
  - start_second: 1080
    end_second: 1200
    title: 平和结束
    lines:
      - 你刚刚完成了一次平衡调整。
      - 把这份和缓留在此刻。
      - 准备好的时候，再慢慢睁开眼睛。
