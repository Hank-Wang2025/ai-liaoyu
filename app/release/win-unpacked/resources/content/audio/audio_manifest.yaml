# ============================================
# 引导语模板 - Voice Guide Templates (20+ 套)
# ============================================
voice_guides:
  # 开场引导 - Opening Guides
  opening:
    - id: welcome_calm
      name: 平静欢迎
      text: 欢迎来到这个安全的空间。请找一个舒适的姿势，让身体完全放松。现在，让我们把注意力带回到当下这一刻...
      emotion: gentle
      speed: 0.95
      duration: 30
      
    - id: welcome_warm
      name: 温暖欢迎
      text: 亲爱的朋友，感谢你来到这里。无论你现在感受如何，都是被接纳的。让我们一起，慢慢地，找回内心的温暖...
      emotion: warm
      speed: 0.9
      duration: 35
      
    - id: welcome_chinese
      name: 中式欢迎
      text: 请您找一个舒适的姿势坐好，轻轻闭上眼睛。让我们一起开始这段宁静的旅程。深深地吸一口气，感受空气缓缓进入身体...
      emotion: calm
      speed: 0.9
      duration: 40
      
    - id: welcome_safe
      name: 安全欢迎
      text: 停下来。深呼吸。你是安全的。让我们用接下来的时间，找回内心的平静。跟着我的声音，深深吸气...慢慢呼出...
      emotion: calm
      speed: 0.9
      duration: 30

  # 呼吸引导 - Breathing Guides
  breathing:
    - id: breath_basic
      name: 基础呼吸
      text: 现在把注意力带到呼吸上。不需要改变呼吸，只是观察它。感受空气进入鼻腔...胸腔的起伏...腹部的扩张与收缩...
      emotion: calm
      speed: 0.9
      duration: 45
      
    - id: breath_478
      name: 4-7-8呼吸
      text: 4-7-8呼吸法。吸气4秒...1...2...3...4...屏住7秒...1...2...3...4...5...6...7...呼气8秒...1...2...3...4...5...6...7...8...
      emotion: calm
      speed: 0.85
      duration: 60
      
    - id: breath_chinese
      name: 中式调息
      text: 现在，让我们开始调息。吸气...二...三...四...屏住...二...三...呼气...二...三...四...五...六...感受每一次呼吸带来的平静...
      emotion: gentle
      speed: 0.85
      duration: 50
      
    - id: breath_release
      name: 释放呼吸
      text: 深深吸气...感受胸腔的扩张...然后用力呼出...想象所有的紧张和压力随着呼气离开身体...
      emotion: calm
      speed: 0.85
      duration: 40

  # 身体扫描 - Body Scan Guides
  body_scan:
    - id: scan_head_down
      name: 从头到脚
      text: 现在，让我们开始身体扫描。把注意力带到头顶...感受那里的任何感觉...慢慢向下移动到额头...眉毛...眼睛...让每一个部位都完全放松...
      emotion: calm
      speed: 0.9
      duration: 60
      
    - id: scan_progressive
      name: 渐进放松
      text: 从头顶开始，让每一块肌肉都完全放松...额头放松...眼睛放松...脸颊放松...下巴放松...让放松的感觉慢慢流向全身...
      emotion: calm
      speed: 0.75
      duration: 70
      
    - id: scan_tension_release
      name: 紧张释放
      text: 首先，紧紧握住双拳，感受手臂的紧张...保持...然后，完全放松...感受紧张消散的感觉...
      emotion: calm
      speed: 0.85
      duration: 50

  # 想象引导 - Visualization Guides
  visualization:
    - id: viz_sunlight
      name: 阳光想象
      text: 想象温暖的阳光洒在身上，感受它的温度。每一缕阳光都在告诉你：生命中总有美好的事物在等待着你...
      emotion: warm
      speed: 0.9
      duration: 40
      
    - id: viz_forest
      name: 森林想象
      text: 想象你正走进一片宁静的森林。阳光透过树叶洒下斑驳的光影。深呼吸，感受清新的空气充满肺部...
      emotion: gentle
      speed: 0.9
      duration: 45
      
    - id: viz_garden
      name: 庭院想象
      text: 想象自己置身于一座宁静的庭院中。四周是古老的树木，微风轻拂。这里没有任何威胁，只有平和与安宁...
      emotion: gentle
      speed: 0.85
      duration: 45
      
    - id: viz_energy
      name: 能量想象
      text: 想象金色的能量从头顶流入，流经全身每一个细胞，带来温暖和活力。你的身体正在充满能量...
      emotion: encouraging
      speed: 1.0
      duration: 40
      
    - id: viz_lake
      name: 湖面想象
      text: 感受内心的湖面逐渐变得平静，倒映着蓝天白云。任何波澜都会慢慢平息，留下一片宁静...
      emotion: calm
      speed: 0.9
      duration: 35

  # 自我关怀 - Self-Compassion Guides
  self_compassion:
    - id: sc_loving_kindness
      name: 慈心祝福
      text: 把一只手放在心口。感受心跳的温暖。对自己说：愿我平安，愿我健康，愿我快乐，愿我自在。重复这些祝福，让它们渗透到内心深处...
      emotion: warm
      speed: 0.85
      duration: 55
      
    - id: sc_acceptance
      name: 自我接纳
      text: 你已经足够好了。不需要完美，不需要证明什么。你的存在本身就是有价值的。带着这份自我接纳，继续前行...
      emotion: encouraging
      speed: 0.9
      duration: 40
      
    - id: sc_strength
      name: 内在力量
      text: 你比你想象的更加坚强。每一次低谷都是成长的机会。相信自己，美好的事物正在向你走来...
      emotion: encouraging
      speed: 0.95
      duration: 35

  # 结束引导 - Closing Guides
  closing:
    - id: close_gentle
      name: 温柔结束
      text: 很好，你做得非常好。现在让身心慢慢平静下来。带着这份平静，继续你的一天。
      emotion: warm
      speed: 0.95
      duration: 25
      
    - id: close_encouraging
      name: 鼓励结束
      text: 很好！感受身体中流动的能量。你已经准备好迎接新的挑战。带着这份活力，开始新的旅程吧！
      emotion: encouraging
      speed: 1.0
      duration: 30
      
    - id: close_peaceful
      name: 平和结束
      text: 感受内心的和谐与平衡。你的身心现在处于最佳状态。带着这份平和，你可以从容面对生活中的一切...
      emotion: warm
      speed: 0.9
      duration: 35
      
    - id: close_sleep
      name: 睡眠结束
      text: 现在，让意识慢慢沉入宁静的深处...你是安全的...你是被爱的...让睡眠温柔地拥抱你...
      emotion: gentle
      speed: 0.7
      duration: 30
      
    - id: close_nature
      name: 自然结束
      text: 是时候离开了。但这份宁静会一直陪伴着你。无论何时需要，你都可以在心中回到这里。带着这份平静，回到现实世界吧。
      emotion: encouraging
      speed: 0.95
      duration: 35

# ============================================
# 音频规格要求 - Audio Specifications
# ============================================
specifications:
  format: mp3
  sample_rate: 44100
  bit_rate: 320kbps
  channels: stereo
  normalization: -14 LUFS
  
  requirements:
    - 所有音频文件必须无版权问题或已获得授权
    - 背景音乐应无人声或仅有轻柔和声
    - 自然音效应为高质量实地录音
    - 所有音频应经过降噪处理
    - 循环播放的音频应有平滑的循环点

# ============================================
# 统计信息 - Statistics
# ============================================
statistics:
  total_background_music: 52
  total_nature_sounds: 11
  total_voice_guides: 24
  total_audio_files: 87
